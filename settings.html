<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>prompt-ref settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      padding: 24px;
      background: #09090b;
      color: #f4f4f5;
      font-family: "Geist Mono", "Fira Code", monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    h1 { font-size: 14px; font-weight: 600; }
    label { display: flex; flex-direction: column; gap: 6px; }
    label span { color: #71717a; font-size: 10px; }
    input {
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      color: #f4f4f5;
      font-family: inherit;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
      width: 100%;
    }
    input:focus { border-color: #71717a; }
    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #f4f4f5;
      color: #09090b;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary { background: #27272a; color: #f4f4f5; border: 1px solid #3f3f46; }
    button:hover { background: #e4e4e7; }
    button.secondary:hover { background: #3f3f46; }
    .msg { font-size: 11px; min-height: 14px; }
    .msg.ok { color: #86efac; }
    .msg.err { color: #fca5a5; }
    p.hint { color: #52525b; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>prompt-ref — Eagle settings</h1>

  <p class="hint">Saves scraped prompts into Eagle via its local API. Eagle must be running. Settings are stored locally in your browser.</p>

  <label>
    <span>eagle api port</span>
    <input id="eaglePort" type="number" placeholder="41595" />
  </label>

  <label>
    <span>parent folder (model subfolders are created under this)</span>
    <input id="parentFolder" type="text" placeholder="Prompts" />
  </label>

  <label>
    <span>api token (optional — only if your Eagle requires one)</span>
    <input id="eagleToken" type="password" placeholder="leave blank if not needed" />
  </label>

  <div class="btn-row">
    <button class="secondary" id="test">test connection</button>
    <button id="save">save settings</button>
  </div>
  <span class="msg" id="msg"></span>

  <script src="settings.js"></script>
</body>
</html>
